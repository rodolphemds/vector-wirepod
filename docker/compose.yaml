name: vector_containers

services:
  wire-pod:
    container_name: wire-pod
    hostname: escapepod
    build:
      context: ..
      dockerfile: docker/dockerfile
    restart: unless-stopped
    env_file:
      - "../.env"
      - "../../vector-w2b1/.env"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "8084:8084"
    volumes:
      - wirepod-data:/data
      - wirepod-images:/images
      - type: bind
        source: ../../vector-w2b1
        target: /vector-w2b1
        read_only: true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    name: vector_containers_default

volumes:
  wirepod-data:
    driver: local
  wirepod-images:
    driver: local
